name: Regulatory Tools Forge Health

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  forge-health:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml importlib_resources
          pip install "forge-utils[collectors] @ git+https://github.com/reneeqian/forge.git"

      - name: Install project
        run: pip install -e .

      - name: Run forge health assessment
        run: python runtests.py

      - name: Commit README health update
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update forge health report [skip ci]"
          git push || echo "README push skipped (protected branch — update will arrive via PR)"

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-health-report
          path: |
            docs/traceability_matrix.md
            artifacts/
